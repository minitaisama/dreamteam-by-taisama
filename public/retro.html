<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dream Team Retro Dashboard</title>
  <meta name="description" content="A retro-style weekly dashboard for the Dream Team: stats, agent highlights, action items, and trends." />
  <meta name="theme-color" content="#0a0a0f" />

  <!-- Open Graph -->
  <meta property="og:title" content="Dream Team Retro Dashboard" />
  <meta property="og:description" content="Weekly retrospectives with stats, action items, and trend charts across the Dream Team." />
  <meta property="og:image" content="https://dreamteam20.vercel.app/apple-touch-icon.png" />
  <meta property="og:url" content="https://dreamteam20.vercel.app/" />
  <meta property="og:type" content="website" />

  <!-- Icons -->
  <link rel="icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3a;

      /* Contrast-adjusted tokens (per audit/task card) */
      --text: #e8e8ec;
      --text2: #b8b8c4;
      --text3: #8b8b99;

      --accent: #8b5cf6;
      --accent2: #6d28d9;

      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --blue: #3b82f6;
      --ceo: #f59e0b;

      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { color: #a78bfa; text-decoration: underline; }

    .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.25rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 0;
    }

    .brand-logo {
      width: 32px;
      height: 32px;
      border-radius: 9999px;
      border: 1px solid rgba(255,255,255,0.18);
      object-fit: cover;
      flex: 0 0 auto;
    }

    .brand-text { min-width: 0; }

    .brand-title {
      font-size: 1.75rem;
      font-weight: 750;
      line-height: 1.15;
      background: linear-gradient(135deg, var(--accent), var(--ceo));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--text3);
      font-size: 0.9rem;
      margin-top: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 60ch;
    }

    .week-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      color: var(--text2);
      white-space: nowrap;
    }

    .week-nav { display: flex; gap: 0.5rem; align-items: center; }

    .week-nav button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.375rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.2s;
    }

    .week-nav button:hover { border-color: var(--accent); color: var(--accent); }
    .week-nav button:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Section titles */
    section { margin-bottom: 2rem; }

    .section-title {
      font-size: 1rem;
      font-weight: 650;
      color: var(--text);
      margin-bottom: 1rem;
      padding-left: 0.85rem;
      border-left: 3px solid var(--accent);
      letter-spacing: 0.01em;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .stat-value {
      font-size: 1.75rem;
      font-weight: 750;
      margin-top: 0.25rem;
      color: #ffffff;
    }

    .stat-value .stat-suffix {
      font-size: 1rem;
      color: var(--text2);
      font-weight: 650;
    }

    .stat-change {
      font-size: 0.75rem;
      margin-top: 0.25rem;
      color: var(--text2);
    }

    .stat-change.up { color: var(--green); }
    .stat-change.down { color: var(--red); }

    /* Agent Cards */
    .agents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.25rem;
    }

    .agent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: border-color 0.2s;
    }

    .agent-card:hover { border-color: var(--accent); }

    .agent-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      gap: 0.75rem;
    }

    .agent-name {
      font-weight: 650;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .agent-role { font-size: 0.75rem; color: var(--text3); }

    .agent-badge {
      font-size: 0.72rem;
      padding: 0.2rem 0.6rem;
      border-radius: 9999px;
      font-weight: 650;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* Lighter badge text colors to clear AA at small font sizes */
    .badge-coach { background: rgba(59,130,246,0.10); color: #bfdbfe; }
    .badge-lebron { background: rgba(34,197,94,0.10); color: #bbf7d0; }
    .badge-curry { background: rgba(234,179,8,0.10); color: #fef08a; }
    .badge-ceo { background: rgba(245,158,11,0.10); color: #fde68a; }

    .agent-card.ceo-card {
      border-color: rgba(245,158,11,0.25);
      background: linear-gradient(135deg, var(--surface), rgba(245,158,11,0.03));
    }

    .agent-card.ceo-card:hover { border-color: var(--ceo); }

    .agent-stats {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .agent-stat { font-size: 0.8rem; }
    .agent-stat .num { font-weight: 700; color: var(--text); }
    .agent-stat .lbl { color: var(--text3); }

    .agent-section { margin-bottom: 0.75rem; }

    .agent-section-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text3);
      margin-bottom: 0.35rem;
    }

    .agent-section ul { list-style: none; padding: 0; }

    .agent-section li {
      font-size: 0.85rem;
      color: var(--text2);
      padding-left: 1rem;
      position: relative;
    }

    .agent-section li::before { content: "→"; position: absolute; left: 0; color: var(--accent); }
    .agent-section.suggestions li::before { content: "💡"; position: absolute; left: 0; }

    /* Action Items */
    .action-items {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    .action-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.875rem;
      gap: 0.75rem;
    }

    .action-item:last-child { border-bottom: none; }

    .action-item .owner {
      background: var(--surface2);
      padding: 0.15rem 0.5rem;
      border-radius: 6px;
      font-size: 0.75rem;
      color: var(--text2);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .action-item .due { color: var(--text2); font-size: 0.75rem; }

    /* Charts */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 1.25rem;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    .chart-card h3 { font-size: 0.95rem; margin-bottom: 1rem; color: var(--text2); }
    .chart-card canvas { max-height: 250px; }

    /* Footer */
    .footer {
      text-align: center;
      padding: 2rem 0;
      color: var(--text3);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }

    .footer .links { margin-top: 0.5rem; display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .footer .sep { color: rgba(255,255,255,0.18); }

    /* Responsive */
    @media (max-width: 640px) {
      .container { padding: 1rem; }
      .header { flex-direction: column; align-items: flex-start; gap: 1rem; }
      .week-nav { width: 100%; justify-content: space-between; }
      .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .agents-grid { grid-template-columns: 1fr; }
      .agent-card { padding: 1.125rem; }
      .chart-card { padding: 1.125rem; }
      .action-items { padding: 1.125rem; }
      .agent-stats { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0.5rem 1rem; }
    }

    @media (max-width: 420px) {
      .stats-grid { grid-template-columns: 1fr; }
      .stat-value { font-size: 1.55rem; }
    }
  </style>
</head>

<body>
  <div class="container">
    <header class="header">
      <div class="brand">
        <img class="brand-logo" src="/penguin.jpg" alt="Dream Team Retro logo" width="32" height="32" />
        <div class="brand-text">
          <h1 class="brand-title">Dream Team Retro</h1>
          <div class="subtitle">minitaisama/dreamteam2.0</div>
        </div>
      </div>

      <div class="week-nav" aria-label="Week navigation">
        <button id="prevWeek" onclick="changeWeek(-1)">← Prev</button>
        <span class="week-badge" id="weekLabel">Week 11</span>
        <button id="nextWeek" onclick="changeWeek(1)">Next →</button>
      </div>
    </header>

    <main>
      <section aria-labelledby="statsTitle">
        <h2 id="statsTitle" class="section-title">Stats</h2>
        <div class="stats-grid" id="statsGrid"></div>
      </section>

      <section aria-labelledby="agentsTitle">
        <h2 id="agentsTitle" class="section-title">Agents</h2>
        <div class="agents-grid" id="agentsGrid"></div>
      </section>

      <section class="action-items" id="actionItems" aria-labelledby="actionItemsTitle">
        <h2 id="actionItemsTitle" class="section-title">Action Items</h2>
        <div id="actionList"></div>
      </section>

      <section aria-labelledby="chartsTitle">
        <h2 id="chartsTitle" class="section-title">Charts</h2>
        <div class="charts-grid">
          <div class="chart-card">
            <h3>Velocity Trend</h3>
            <canvas id="velocityChart"></canvas>
          </div>
          <div class="chart-card">
            <h3>Quality Score</h3>
            <canvas id="qualityChart"></canvas>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div>Dream Team v3 · MiniSama (CEO) · Coach (PM) · Lebron (Dev) · Curry (QA)</div>
      <div class="links">
        <a href="https://github.com/minitaisama/dreamteam2.0" target="_blank" rel="noreferrer">GitHub</a>
        <span class="sep">·</span>
        <a href="/PLAYBOOK.md" target="_blank" rel="noreferrer">Playbook</a>
      </div>
    </footer>
  </div>

  <script>
    const WEEKS = [];
    let currentWeekIndex = 0;

    async function loadWeeks() {
      try {
        const basePath = window.location.pathname.includes('/weeks') ? '../..' : '.';
        const res = await fetch(basePath + '/data/weeks/index.json');
        if (!res.ok) throw new Error('Failed to fetch index');
        const index = await res.json();
        WEEKS.push(...index.weeks.sort().reverse());
        if (WEEKS.length === 0) {
          document.getElementById('statsGrid').textContent = 'No retrospective data yet.';
          return;
        }
        currentWeekIndex = 0;
        await renderWeek();
        renderCharts();
      } catch (e) {
        console.error('loadWeeks error:', e);
        document.getElementById('statsGrid').textContent = 'Failed to load data: ' + e.message;
      }
    }

    async function loadWeekData(weekId) {
      const basePath = window.location.pathname.includes('/weeks') ? '../..' : '.';
      const res = await fetch(basePath + `/data/weeks/${weekId}.json`);
      if (!res.ok) throw new Error(`Failed to fetch ${weekId}`);
      return await res.json();
    }

    function changeWeek(delta) {
      const newIndex = currentWeekIndex + delta;
      if (newIndex >= 0 && newIndex < WEEKS.length) {
        currentWeekIndex = newIndex;
        renderWeek();
      }
    }

    async function renderWeek() {
      const weekId = WEEKS[currentWeekIndex];
      const data = await loadWeekData(weekId);

      const weekNum = weekId.replace('2026-W', '');
      document.getElementById('weekLabel').textContent = `Week ${weekNum}`;
      document.getElementById('prevWeek').disabled = currentWeekIndex === 0;
      document.getElementById('nextWeek').disabled = currentWeekIndex === WEEKS.length - 1;

      // CEO
      const ceo = data.ceo;
      const ceoTrends = ceo.trends || {};

      // Stats — include all 4 agents
      const agents = data.agents;
      const totalTasks = Object.values(agents).reduce((s, a) => s + (a.stats.tasks_completed || a.stats.audits_completed || 0), 0);
      const totalBlocked = Object.values(agents).reduce((s, a) => s + (a.stats.tasks_blocked || 0), 0);
      const qualityScore = ceoTrends.quality_score || agents.curry?.stats?.quality_score || '-';
      const velocity = ceoTrends.velocity || '-';
      const actionItemsCount = (ceo.action_items || []).length;

      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
          <div class="stat-label">Tasks Done</div>
          <div class="stat-value">${totalTasks}</div>
          <div class="stat-change">across 3 agents</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Blocked</div>
          <div class="stat-value">${totalBlocked}</div>
          <div class="stat-change ${totalBlocked > 0 ? 'down' : 'up'}">${totalBlocked > 0 ? 'needs help' : 'clear runway'}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Quality</div>
          <div class="stat-value">${qualityScore}<span class="stat-suffix">/10</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Velocity</div>
          <div class="stat-value" style="font-size:1.25rem">${velocity}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Action Items</div>
          <div class="stat-value">${actionItemsCount}</div>
          <div class="stat-change">from CEO review</div>
        </div>
      `;

      // Agent cards — CEO first, then PM/Dev/QA
      const roleMap = { coach: 'PM', lebron: 'Dev', curry: 'QA' };
      const badgeMap = { coach: 'badge-coach', lebron: 'badge-lebron', curry: 'badge-curry' };

      function buildAgentCard(name, badge, role, agent, extraClass) {
        const statsHtml = agent.stats ? Object.entries(agent.stats).map(([k, v]) =>
          `<div class="agent-stat"><span class="num">${v}</span> <span class="lbl">${k.replace(/_/g, ' ')}</span></div>`
        ).join('') : '';
        const cls = extraClass ? ` ${extraClass}` : '';

        return `
          <div class="agent-card${cls}">
            <div class="agent-header">
              <div>
                <div class="agent-name">${name} <span class="agent-badge ${badge}">${role}</span></div>
              </div>
            </div>
            ${statsHtml ? `<div class="agent-stats">${statsHtml}</div>` : ''}
            ${agent.commentary ? `<div class="agent-section"><div class="agent-section-title">Commentary</div><p style="font-size:0.85rem;color:var(--text2)">${agent.commentary}</p></div>` : ''}
            ${agent.highlights?.length ? `<div class="agent-section"><div class="agent-section-title">Highlights</div><ul>${agent.highlights.map(h=>`<li>${h}</li>`).join('')}</ul></div>` : ''}
            ${agent.keep_doing?.length ? `<div class="agent-section"><div class="agent-section-title">Keep Doing</div><ul>${agent.keep_doing.map(h=>`<li>${h}</li>`).join('')}</ul></div>` : ''}
            ${agent.improve?.length ? `<div class="agent-section"><div class="agent-section-title">Improve</div><ul>${agent.improve.map(h=>`<li>${h}</li>`).join('')}</ul></div>` : ''}
            ${agent.flow_suggestions?.length ? `<div class="agent-section suggestions"><div class="agent-section-title">Flow Suggestions</div><ul>${agent.flow_suggestions.map(h=>`<li>${h}</li>`).join('')}</ul></div>` : ''}
            ${agent.blockers?.length ? `<div class="agent-section"><div class="agent-section-title">Blockers</div><ul>${agent.blockers.map(h=>`<li style="color:var(--yellow)">${h}</li>`).join('')}</ul></div>` : ''}
            ${agent.product_insights?.length ? `<div class="agent-section"><div class="agent-section-title">Product Insights</div><ul>${agent.product_insights.map(h=>`<li>${h}</li>`).join('')}</ul></div>` : ''}
          </div>
        `;
      }

      // Build CEO card
      const ceoCard = buildAgentCard('MiniSama', 'badge-ceo', 'CEO', ceo, 'ceo-card');

      // Build execution agent cards
      const execCards = Object.entries(agents).map(([key, agent]) =>
        buildAgentCard(key.charAt(0).toUpperCase() + key.slice(1), badgeMap[key], roleMap[key], agent, '')
      ).join('');

      document.getElementById('agentsGrid').innerHTML = ceoCard + execCards;

      // Action items
      const actions = data.ceo.action_items || [];
      document.getElementById('actionList').innerHTML = actions.length ? actions.map(a => `
        <div class="action-item">
          <span>${a.action}</span>
          <div style="display:flex;gap:0.5rem;align-items:center;flex:0 0 auto">
            <span class="owner">${a.owner}</span>
            <span class="due">due ${a.due}</span>
          </div>
        </div>
      `).join('') : '<div style="color:var(--text2);font-size:0.875rem">No action items.</div>';
    }

    async function renderCharts() {
      const allData = await Promise.all(WEEKS.map(w => loadWeekData(w)));
      const labels = allData.map(d => d.week.replace('2026-W', 'W'));

      const velocities = allData.map(d => {
        const agents = d.agents;
        return Object.values(agents).reduce((s, a) => s + (a.stats.tasks_completed || a.stats.audits_completed || 0), 0);
      });

      const qualities = allData.map(d => d.ceo.trends?.quality_score || d.agents.curry?.stats?.quality_score || 0);

      const chartDefaults = {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b8b99', font: { size: 12 } } },
          y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b8b99', font: { size: 12 } }, beginAtZero: true }
        }
      };

      // Velocity
      new Chart(document.getElementById('velocityChart'), {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'Tasks',
            data: velocities,
            borderColor: '#8b5cf6',
            backgroundColor: 'rgba(139,92,246,0.1)',
            fill: true,
            tension: 0.3,
            pointBackgroundColor: '#8b5cf6',
            pointRadius: 5,
            pointHoverRadius: 7
          }]
        },
        options: chartDefaults
      });

      // Quality
      new Chart(document.getElementById('qualityChart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: 'Score',
            data: qualities,
            backgroundColor: qualities.map(q => q >= 8 ? 'rgba(34,197,94,0.6)' : q >= 6 ? 'rgba(234,179,8,0.6)' : 'rgba(239,68,68,0.6)'),
            borderColor: qualities.map(q => q >= 8 ? '#22c55e' : q >= 6 ? '#eab308' : '#ef4444'),
            borderWidth: 1,
            borderRadius: 6
          }]
        },
        options: { ...chartDefaults, scales: { ...chartDefaults.scales, y: { ...chartDefaults.scales.y, max: 10 } } }
      });
    }

    loadWeeks();
  </script>
</body>
</html>
